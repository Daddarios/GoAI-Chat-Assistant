name: Publish to Hugging Face Spaces

on:
  push:
    branches: [master] # Eğer ana dalınız 'main' ise 'master' yerine 'main' yazın

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        lfs: true

    - name: Push to HF
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git push --force https://Daddarios:$HF_TOKEN@huggingface.co/spaces/Daddarios/GoAI-Lab master
